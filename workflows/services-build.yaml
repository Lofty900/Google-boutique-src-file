name: Build and Push Google Boutique Services Images

on:
  push:
    branches:
      - main


env:
  REGISTRY: docker.io
  IMAGE_NAMESPACE: "08161684557"
  PASSWORD: "dckr_pat_eM-Pdx0IlEtbY4wMpjX7mBj9EDM"
jobs:

  build-and-push:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - adservice
          - checkoutservice
          - emailservice
          - loadgenerator
          - productcatalogservice
          - shippingservice
          - cartservice
          - currencyservice
          - frontend
          - paymentservice
          - recommendationservice
          - shoppingassistantservice

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}

    - name: Build and Push Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: src/${{ matrix.service }}/Dockerfile
        push: true
        tags: |
          ${{ env.IMAGE_NAMESPACE }}/google-boutique-microservice-${{ matrix.service }}:1.0.0
          ${{ env.IMAGE_NAMESPACE }}/google-boutique-microservice-${{ matrix.service }}:latest

